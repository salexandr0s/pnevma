name: Pnevma
options:
  bundleIdPrefix: com.pnevma
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Pnevma
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

schemes:
  Pnevma:
    build:
      targets:
        Pnevma: all
    run:
      config: Debug
      executable: Pnevma
    test:
      config: Debug
      targets:
        - PnevmaTests
        - PnevmaUITests
  PnevmaTests:
    build:
      targets:
        Pnevma: [test]
        PnevmaTests: [test]
    test:
      config: Debug
      targets:
        - PnevmaTests
  PnevmaUITests:
    build:
      targets:
        Pnevma: [test]
        PnevmaUITests: [test]
    test:
      config: Debug
      targets:
        - PnevmaUITests

targets:
  Pnevma:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Pnevma
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.app
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        CODE_SIGN_ENTITLEMENTS: Pnevma/Pnevma.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Pnevma/Bridge/Pnevma-Bridging-Header.h
        # Rust staticlib — path is relative to the Xcode project file (native/)
        # Debug: ../target/aarch64-apple-darwin/debug/libpnevma_bridge.a
        # Release: ../target/aarch64-apple-darwin/release/libpnevma_bridge.a
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/$(CONFIGURATION:lower)/ -lpnevma_bridge -lstdc++
      debug:
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/debug/ -lpnevma_bridge -lstdc++
      release:
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/release/ -lpnevma_bridge -lstdc++
    dependencies:
      - framework: ../vendor/ghostty/macos/GhosttyKit.xcframework
        embed: false
      - sdk: AppIntents.framework
      - sdk: Carbon.framework
      - sdk: Cocoa.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: WebKit.framework
      - sdk: libresolv.tbd
      - sdk: libsqlite3.tbd

  PnevmaTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PnevmaTests
    dependencies:
      - target: Pnevma
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_NAME: PnevmaTests
        PRODUCT_MODULE_NAME: PnevmaTests
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.tests
        GENERATE_INFOPLIST_FILE: YES

  PnevmaUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PnevmaUITests
    dependencies:
      - target: Pnevma
    settings:
      base:
        PRODUCT_NAME: PnevmaUITests
        PRODUCT_MODULE_NAME: PnevmaUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.uitests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
