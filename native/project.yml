name: Pnevma
options:
  bundleIdPrefix: com.pnevma
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Pnevma
    SWIFT_VERSION: "6.1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

schemes:
  Pnevma:
    build:
      targets:
        Pnevma: all
    run:
      config: Debug
      executable: Pnevma
    test:
      config: Debug
      targets:
        - PnevmaAppDelegateTests
        - PnevmaTests
        - PnevmaUITests
  PnevmaAppDelegateTests:
    build:
      targets:
        Pnevma: [test]
        PnevmaAppDelegateTests: [test]
    test:
      config: Debug
      targets:
        - PnevmaAppDelegateTests
  PnevmaTests:
    build:
      targets:
        Pnevma: [test]
        PnevmaTests: [test]
    test:
      config: Debug
      targets:
        - PnevmaTests
  PnevmaUITests:
    build:
      targets:
        Pnevma: [test]
        PnevmaUITests: [test]
    test:
      config: Debug
      targets:
        - PnevmaUITests

targets:
  Pnevma:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    preBuildScripts:
      - name: Build Rust Bridge
        shell: /bin/zsh
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."

          if [[ "${CONFIGURATION}" == "Release" ]]; then
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-bridge --target aarch64-apple-darwin --release
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-session --bin pnevma-session-proxy --target aarch64-apple-darwin --release
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-remote-helper --target aarch64-apple-darwin --release
          else
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-bridge --target aarch64-apple-darwin
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-session --bin pnevma-session-proxy --target aarch64-apple-darwin
            ./scripts/with-rust-toolchain.sh cargo build -p pnevma-remote-helper --target aarch64-apple-darwin
          fi
      - name: Embed Session Proxy
        shell: /bin/zsh
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          HELPERS_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          mkdir -p "$HELPERS_DIR"
          CONF_DIR=$(echo "${CONFIGURATION}" | tr '[:upper:]' '[:lower:]')
          cp "$SRCROOT/../target/aarch64-apple-darwin/${CONF_DIR}/pnevma-session-proxy" "$HELPERS_DIR/"
          cp "$SRCROOT/../target/aarch64-apple-darwin/${CONF_DIR}/pnevma-remote-helper" "$HELPERS_DIR/"
    sources:
      - path: Pnevma
        excludes:
          - "**/*.entitlements"
      - path: Pnevma/App/AppDelegate+Notifications.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.app
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        CODE_SIGN_ENTITLEMENTS: Pnevma/Pnevma.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Pnevma/Bridge/Pnevma-Bridging-Header.h
        # Rust staticlib — path is relative to the Xcode project file (native/)
        # Debug: ../target/aarch64-apple-darwin/debug/libpnevma_bridge.a
        # Release: ../target/aarch64-apple-darwin/release/libpnevma_bridge.a
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/$(CONFIGURATION:lower)/ -lpnevma_bridge -lstdc++
      debug:
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/debug/ -lpnevma_bridge -lstdc++
      release:
        OTHER_LDFLAGS: $(inherited) -L$(SRCROOT)/../target/aarch64-apple-darwin/release/ -lpnevma_bridge -lstdc++
    dependencies:
      - framework: ../vendor/ghostty/macos/GhosttyKit.xcframework
        embed: false
      - sdk: AppIntents.framework
      - sdk: Carbon.framework
      - sdk: Cocoa.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: WebKit.framework
      - sdk: libresolv.tbd
      - sdk: libsqlite3.tbd

  PnevmaTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: PnevmaTests
    dependencies:
      - target: Pnevma
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_NAME: PnevmaTests
        PRODUCT_MODULE_NAME: PnevmaTests
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.tests
        GENERATE_INFOPLIST_FILE: YES

  PnevmaAppDelegateTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: PnevmaAppDelegateTests
    dependencies:
      - target: Pnevma
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_NAME: PnevmaAppDelegateTests
        PRODUCT_MODULE_NAME: PnevmaAppDelegateTests
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.appdelegatetests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/Pnevma.app/Contents/MacOS/Pnevma"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pnevma.app/Contents/MacOS/Pnevma"

  PnevmaUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: PnevmaUITests
    dependencies:
      - target: Pnevma
    settings:
      base:
        PRODUCT_NAME: PnevmaUITests
        PRODUCT_MODULE_NAME: PnevmaUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.pnevma.uitests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
