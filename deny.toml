# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
  "aarch64-apple-darwin",
]

# ── Advisories ────────────────────────────────────────────────────────────────

[advisories]
version = 2

ignore = [
  # RUSTSEC-2023-0071: Marvin Attack timing side-channel in `rsa` crate.
  # Enters via sqlx-mysql (transitive). Pnevma uses SQLite only — rsa is never reachable at runtime.
  "RUSTSEC-2023-0071",
]

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
version = 2
# Pnevma is dual-licensed MIT OR Apache-2.0.
# Allow only permissive licenses compatible with this.

allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "OpenSSL",
  "CC0-1.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

# ── Bans ──────────────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

deny = [
  # Avoid known-problematic crates
  { name = "openssl", wrappers = [] },
  { name = "openssl-sys", wrappers = [] },
]

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
