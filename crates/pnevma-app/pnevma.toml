[project]
name = "pnevma-app"
brief = "Agent-era execution workspace"

[agents]
default_provider = "claude-code"
max_concurrent = 4

[branches]
target = "main"
naming = "task/{id}-{slug}"

[automation]
socket_enabled = true
socket_path = ".pnevma/run/control.sock"
socket_auth = "same-user"

[rules]
paths = [".pnevma/rules/*.md"]

[conventions]
paths = [".pnevma/conventions/*.md"]
