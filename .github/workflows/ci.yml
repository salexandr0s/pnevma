name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI_ARTIFACT_RETENTION_DAYS: 30

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        run: ./scripts/run-gitleaks.sh

  workflow-hygiene:
    name: Workflow and shell hygiene
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Run actionlint
        run: ~/go/bin/actionlint

  rust:
    name: Rust checks
    runs-on: macos-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tools-audit-deny-cyclonedx-v1

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Install cargo-deny
        run: command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked

      - name: Check licenses, bans, and advisories
        run: cargo deny check

      - name: Install cargo-cyclonedx
        run: command -v cargo-cyclonedx >/dev/null 2>&1 || cargo install cargo-cyclonedx --locked

      - name: Verify migration checksums
        run: ./scripts/check-migration-checksums.sh

      - name: Generate SBOM
        run: cargo cyclonedx --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./**/*.cdx.json
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  native-build:
    name: Native app build
    runs-on: macos-26
    needs: rust
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just

      - name: Install pinned XcodeGen
        run: ./scripts/install-xcodegen-ci.sh

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "WARNING: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
          fi

      - name: Check generated Xcode project parity
        run: just xcodegen-check

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build Swift app
        run: just xcode-build

      - name: Check entitlements
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p native/build/security-artifacts
          cp native/Pnevma/Pnevma.entitlements native/build/security-artifacts/Pnevma.entitlements.source.plist
          ./scripts/check-entitlements.sh 2>&1 | tee native/build/security-artifacts/entitlements-check.txt
          if codesign -d --entitlements :- "$GITHUB_WORKSPACE/native/build/Build/Products/Debug/Pnevma.app" \
            > native/build/security-artifacts/Pnevma.entitlements.effective.plist 2>/dev/null \
            && [[ -s native/build/security-artifacts/Pnevma.entitlements.effective.plist ]]; then
            true
          else
            echo "effective entitlements unavailable on unsigned debug build" \
              > native/build/security-artifacts/Pnevma.entitlements.effective.plist
          fi

      - name: Run Swift tests
        run: just xcode-test

      - name: Check FFI coverage
        run: ./scripts/check-ffi-coverage.sh

      - name: Run Ghostty smoke
        run: ./scripts/run-ghostty-smoke.sh

      - name: Upload native security artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: native-security-artifacts
          path: native/build/security-artifacts/**
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

      - name: Upload native logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: native-build-logs
          path: native/build/logs/**
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}
