name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI_ARTIFACT_RETENTION_DAYS: 30

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workflow-hygiene:
    name: Workflow and shell hygiene
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Run actionlint
        run: ~/go/bin/actionlint

  rust:
    name: Rust checks
    runs-on: macos-latest
    needs: [secret-scan, workflow-hygiene]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses, bans, and advisories
        run: cargo deny check

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: cargo cyclonedx --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: ./**/*.cdx.json
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  native-build:
    name: Native app build
    runs-on: macos-latest
    needs: rust
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just xcodegen

      - name: Install pinned Zig
        run: |
          ZIG_VERSION="$(cat .zig-version)"
          curl -sSfL "https://ziglang.org/download/${ZIG_VERSION}/zig-macos-aarch64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          sudo mv "/tmp/zig-macos-aarch64-${ZIG_VERSION}" /opt/zig
          echo "/opt/zig" >> "$GITHUB_PATH"
          /opt/zig/zig version

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "WARNING: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
          fi

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build Swift app
        run: just xcode-build

      - name: Check entitlements
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p native/build/security-artifacts
          cp native/Pnevma/Pnevma.entitlements native/build/security-artifacts/Pnevma.entitlements.source.plist
          ./scripts/check-entitlements.sh 2>&1 | tee native/build/security-artifacts/entitlements-check.txt
          if codesign -d --entitlements :- "$GITHUB_WORKSPACE/native/build/Build/Products/Debug/Pnevma.app" \
            > native/build/security-artifacts/Pnevma.entitlements.effective.plist 2>/dev/null \
            && [[ -s native/build/security-artifacts/Pnevma.entitlements.effective.plist ]]; then
            true
          else
            echo "effective entitlements unavailable on unsigned debug build" \
              > native/build/security-artifacts/Pnevma.entitlements.effective.plist
          fi

      - name: Run Swift tests
        run: just xcode-test

      - name: Run Ghostty smoke
        run: ./scripts/run-ghostty-smoke.sh

      - name: Upload native security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-security-artifacts
          path: native/build/security-artifacts/**
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

      - name: Upload native logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-build-logs
          path: native/build/logs/**
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}
