name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_ARTIFACT_RETENTION_DAYS: 90

jobs:
  build:
    name: Build release app
    runs-on: macos-26
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify tag is on main branch
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tagged commit is not on the main branch"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-tools-audit-deny-cyclonedx-v2

      - name: Install native build tools
        run: brew install just

      - name: Install pinned XcodeGen
        run: ./scripts/install-xcodegen-ci.sh

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "ERROR: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
            exit 1
          fi

      - name: Check generated Xcode project parity
        run: just xcodegen-check

      - name: Check release metadata alignment
        run: ./scripts/release-version.sh check "$GITHUB_REF_NAME"

      - name: Quality gates
        run: |
          command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked
          command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked
          command -v cargo-zigbuild >/dev/null 2>&1 || cargo install cargo-zigbuild --locked
          just check
          cargo deny check

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build native app (release)
        run: just xcode-build-release

      - name: Resolve release artifact paths
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          VERSION="$(./scripts/release-version.sh check "$GITHUB_REF_NAME")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run packaged launch smoke before signing
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Generate SBOM
        run: |
          command -v cargo-cyclonedx >/dev/null 2>&1 || cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-app-bundle
          path: |
            native/build/Release/Pnevma.app
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./**/*.cdx.json
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  sign-package:
    name: Sign and prove candidate package
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-app-bundle
          path: native/build

      - name: Resolve release artifact paths
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          # GitHub artifact upload/download strips executable permissions.
          # Restore them on all Mach-O binaries before signing.
          find "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Helpers" \
            -type f -exec chmod +x {} + 2>/dev/null || true
          VERSION="$(./scripts/release-version.sh check "$GITHUB_REF_NAME")"
          {
            echo "APP_PATH=$APP_PATH"
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg"
            echo "CHECKSUM_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg.sha256"
          } >> "$GITHUB_ENV"
          mkdir -p release-evidence

      - name: Prepare signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/release-signing" \
          ./scripts/release-prepare-signing-keychain.sh
          cat "$RUNNER_TEMP/release-signing/signing-keychain.env" >> "$GITHUB_ENV"

      - name: Produce signed candidate and evidence bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.SIGNING_KEYCHAIN_PATH }}
        run: |
          EVIDENCE_DIR="$GITHUB_WORKSPACE/release-evidence" \
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          RUN_PREFLIGHT=0 \
          ./scripts/release-signed-candidate.sh

      - name: Upload release evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-security-evidence
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload release logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-build-logs
          path: native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

  publish:
    name: Attest and publish release
    runs-on: macos-26
    needs: sign-package
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download release evidence
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-security-evidence
          path: ${{ runner.temp }}/release-evidence

      - name: Download SBOM
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: sbom
          path: ${{ runner.temp }}/sbom

      - name: Resolve artifact paths
        run: |
          VERSION="$(./scripts/release-version.sh check "$GITHUB_REF_NAME")"
          DMG_PATH="$(find "$RUNNER_TEMP/release-evidence" -name '*.dmg' -print -quit)"
          CHECKSUM_PATH="$(find "$RUNNER_TEMP/release-evidence" -name '*.sha256' -print -quit)"
          SBOM_PATH="$(find "$RUNNER_TEMP/sbom" -name '*.cdx.json' -print -quit)"
          test -f "$DMG_PATH"
          test -f "$CHECKSUM_PATH"
          {
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$DMG_PATH"
            echo "CHECKSUM_PATH=$CHECKSUM_PATH"
            echo "SBOM_PATH=$SBOM_PATH"
          } >> "$GITHUB_ENV"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_FILES=("$DMG_PATH" "$CHECKSUM_PATH")
          if [[ -n "${SBOM_PATH:-}" && -f "$SBOM_PATH" ]]; then
            UPLOAD_FILES+=("$SBOM_PATH")
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Pnevma $VERSION" \
            --generate-notes \
            "${UPLOAD_FILES[@]}"
