name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_ARTIFACT_RETENTION_DAYS: 90

jobs:
  build-and-sign:
    name: Build, sign, and notarize
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just xcodegen

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "WARNING: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
          fi

      - name: Quality gates
        run: |
          just check
          cargo install cargo-deny --locked
          cargo deny check

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build native app (release)
        run: just xcode-build-release

      - name: Run packaged launch smoke before signing
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app"
          APP_PATH="$APP_PATH" ./scripts/release-macos-sign.sh

      - name: Notarize app
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app"
          APP_PATH="$APP_PATH" ./scripts/release-macos-notarize.sh

      - name: Staple and verify
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app"
          APP_PATH="$APP_PATH" ./scripts/release-macos-staple-verify.sh

      - name: Run packaged launch smoke after stapling
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch-stapled.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Collect release security evidence
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app"
          mkdir -p release-evidence
          APP_PATH="$APP_PATH" ./scripts/check-entitlements.sh > release-evidence/entitlements-check.txt
          codesign -d --entitlements :- "$APP_PATH" > release-evidence/entitlements.plist 2>/dev/null
          codesign --verify --deep --strict --verbose=2 "$APP_PATH" > release-evidence/codesign-verify.txt 2>&1
          spctl --assess --type exec --verbose=4 "$APP_PATH" > release-evidence/spctl.txt 2>&1

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-cdx

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./**/bom.cdx.json
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload release evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-security-evidence
          path: |
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Package release archive
        run: |
          APP_PATH="native/build/Build/Products/Release/Pnevma.app"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="Pnevma-${VERSION}-macos-arm64.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ${{ env.ARCHIVE }}
            ./**/bom.cdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Pnevma $VERSION" \
            --generate-notes \
            "$ARCHIVE" \
            ./**/bom.cdx.json

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
