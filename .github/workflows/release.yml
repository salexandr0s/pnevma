name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_ARTIFACT_RETENTION_DAYS: 90

jobs:
  build:
    name: Build release app
    runs-on: macos-26
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify tag is on main branch
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tagged commit is not on the main branch"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-tools-audit-deny-cyclonedx-v2

      - name: Install native build tools
        run: brew install just

      - name: Install pinned XcodeGen
        run: ./scripts/install-xcodegen-ci.sh

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "ERROR: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
            exit 1
          fi

      - name: Check generated Xcode project parity
        run: just xcodegen-check

      - name: Quality gates
        run: |
          command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked
          command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked
          command -v cargo-zigbuild >/dev/null 2>&1 || cargo install cargo-zigbuild --locked
          just check
          cargo deny check

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build native app (release)
        run: just xcode-build-release

      - name: Resolve release artifact paths
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$GITHUB_WORKSPACE/native/Info.plist")"
          if [[ "$VERSION" != "$PLIST_VERSION" ]]; then
            echo "Tag version $VERSION does not match Info.plist version $PLIST_VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run packaged launch smoke before signing
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Generate SBOM
        run: |
          command -v cargo-cyclonedx >/dev/null 2>&1 || cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-app-bundle
          path: |
            native/build/Release/Pnevma.app
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./**/*.cdx.json
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  sign-notarize-package:
    name: Sign, notarize, and package
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-app-bundle
          path: native/build

      - name: Resolve release artifact paths
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          # GitHub artifact upload/download strips executable permissions.
          # Restore them on all Mach-O binaries before signing.
          find "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Helpers" \
            -type f -exec chmod +x {} + 2>/dev/null || true
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "APP_PATH=$APP_PATH"
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg"
            echo "CHECKSUM_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg.sha256"
          } >> "$GITHUB_ENV"
          mkdir -p release-evidence

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"
          echo "APPLE_NOTARY_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/app-sign.txt

      - name: Check signed app entitlements
        run: APP_PATH="$APP_PATH" ./scripts/check-entitlements.sh | tee release-evidence/app-entitlements-check.txt

      - name: Package signed DMG
        run: |
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          ./scripts/release-macos-package-dmg.sh | tee release-evidence/dmg-package.txt

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/dmg-sign.txt

      - name: Notarize DMG
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-notarize.sh | tee release-evidence/dmg-notarize.txt

      - name: Staple and verify DMG
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-staple-verify.sh | tee release-evidence/dmg-staple-verify.txt

      - name: Run packaged launch smoke after stapling
        run: |
          DMG_PATH="$DMG_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch-dmg.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Collect release security evidence
        run: |
          codesign -d --entitlements :- "$APP_PATH" > release-evidence/app-entitlements.plist 2>/dev/null
          codesign --verify --deep --strict --verbose=2 "$APP_PATH" > release-evidence/app-codesign-verify.txt 2>&1
          codesign --verify --verbose=2 "$DMG_PATH" > release-evidence/dmg-codesign-verify.txt 2>&1
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH" > release-evidence/dmg-spctl.txt 2>&1 || echo "spctl exited $? (CI runners may lack updated Gatekeeper policy)" >> release-evidence/dmg-spctl.txt
          cp "$CHECKSUM_PATH" release-evidence/

      - name: Upload release evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-security-evidence
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload release logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-build-logs
          path: native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

  publish:
    name: Attest and publish release
    runs-on: macos-26
    needs: sign-notarize-package
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download release evidence
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-security-evidence
          path: ${{ runner.temp }}/release-evidence

      - name: Download SBOM
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: sbom
          path: ${{ runner.temp }}/sbom

      - name: Resolve artifact paths
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_PATH="$(find "$RUNNER_TEMP/release-evidence" -name '*.dmg' -print -quit)"
          CHECKSUM_PATH="$(find "$RUNNER_TEMP/release-evidence" -name '*.sha256' -print -quit)"
          SBOM_PATH="$(find "$RUNNER_TEMP/sbom" -name '*.cdx.json' -print -quit)"
          test -f "$DMG_PATH"
          test -f "$CHECKSUM_PATH"
          {
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$DMG_PATH"
            echo "CHECKSUM_PATH=$CHECKSUM_PATH"
            echo "SBOM_PATH=$SBOM_PATH"
          } >> "$GITHUB_ENV"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_FILES=("$DMG_PATH" "$CHECKSUM_PATH")
          if [[ -n "${SBOM_PATH:-}" && -f "$SBOM_PATH" ]]; then
            UPLOAD_FILES+=("$SBOM_PATH")
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Pnevma $VERSION" \
            --generate-notes \
            "${UPLOAD_FILES[@]}"
