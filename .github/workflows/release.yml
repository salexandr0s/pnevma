name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_ARTIFACT_RETENTION_DAYS: 90

jobs:
  build-and-sign:
    name: Build, sign, and notarize
    runs-on: macos-latest
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just xcodegen

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "WARNING: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
          fi

      - name: Check generated Xcode project parity
        run: just xcodegen-check

      - name: Quality gates
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          just check
          cargo deny check

      - name: Build Ghostty xcframework
        run: just ghostty-build

      - name: Run SwiftPM tests
        run: just spm-test-clean

      - name: Build native app (release)
        run: just xcode-build-release

      - name: Resolve release artifact paths
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$GITHUB_WORKSPACE/native/Info.plist")"
          if [[ "$VERSION" != "$PLIST_VERSION" ]]; then
            echo "Tag version $VERSION does not match Info.plist version $PLIST_VERSION"
            exit 1
          fi
          {
            echo "APP_PATH=$APP_PATH"
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg"
            echo "CHECKSUM_PATH=$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg.sha256"
          } >> "$GITHUB_ENV"
          mkdir -p release-evidence

      - name: Run packaged launch smoke before signing
        run: |
          APP_PATH="$APP_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"
          echo "APPLE_NOTARY_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/app-sign.txt

      - name: Check signed app entitlements
        run: APP_PATH="$APP_PATH" ./scripts/check-entitlements.sh | tee release-evidence/app-entitlements-check.txt

      - name: Notarize app
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-notarize.sh | tee release-evidence/app-notarize.txt

      - name: Staple and verify
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-staple-verify.sh | tee release-evidence/app-staple-verify.txt

      - name: Package signed DMG
        run: |
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          ./scripts/release-macos-package-dmg.sh | tee release-evidence/dmg-package.txt

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/dmg-sign.txt

      - name: Notarize DMG
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-notarize.sh | tee release-evidence/dmg-notarize.txt

      - name: Staple and verify DMG
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-staple-verify.sh | tee release-evidence/dmg-staple-verify.txt

      - name: Run packaged launch smoke after stapling
        run: |
          DMG_PATH="$DMG_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-launch-dmg.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Collect release security evidence
        run: |
          codesign -d --entitlements :- "$APP_PATH" > release-evidence/app-entitlements.plist 2>/dev/null
          codesign --verify --deep --strict --verbose=2 "$APP_PATH" > release-evidence/app-codesign-verify.txt 2>&1
          spctl --assess --type exec --verbose=4 "$APP_PATH" > release-evidence/app-spctl.txt 2>&1
          codesign --verify --verbose=2 "$DMG_PATH" > release-evidence/dmg-codesign-verify.txt 2>&1
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH" > release-evidence/dmg-spctl.txt 2>&1
          cp "$CHECKSUM_PATH" release-evidence/

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-cdx

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./**/bom.cdx.json
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload release evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-security-evidence
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Upload release logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-build-logs
          path: native/build/logs/**
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ./**/bom.cdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Pnevma $VERSION" \
            --generate-notes \
            "$DMG_PATH" \
            "$CHECKSUM_PATH" \
            ./**/bom.cdx.json

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
