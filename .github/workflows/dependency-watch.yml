name: Dependency Watch

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1

      - name: Cache cargo tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-tools-audit-deny-v2

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked

      - name: Run dependency checks
        id: dependency_checks
        run: |
          cargo audit
          cargo deny check

      - name: Open dependency-watch issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Dependency watch failure"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          body=$'The scheduled dependency watch workflow failed.\n\nSee the latest run logs for cargo-audit or cargo-deny output and remediate the advisory set before the next release.'
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
