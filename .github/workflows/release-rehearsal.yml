name: Release Rehearsal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS: 30

jobs:
  release-package-preflight:
    name: Release package preflight
    runs-on: macos-26
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just

      - name: Install pinned XcodeGen
        run: ./scripts/install-xcodegen-ci.sh

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "ERROR: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
            exit 1
          fi

      - name: Cache cargo tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-tools-audit-deny-v2

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked

      - name: Install cargo-zigbuild
        run: command -v cargo-zigbuild >/dev/null 2>&1 || cargo install cargo-zigbuild --locked

      - name: Run release preflight
        run: ./scripts/release-preflight.sh

      - name: Check release metadata alignment
        run: ./scripts/release-version.sh check

      - name: Package release DMG
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          VERSION="$(./scripts/release-version.sh check)"
          DMG_PATH="$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg"
          CHECKSUM_PATH="${DMG_PATH}.sha256"
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          ./scripts/release-macos-package-dmg.sh
          {
            echo "APP_PATH=$APP_PATH"
            echo "DMG_PATH=$DMG_PATH"
            echo "CHECKSUM_PATH=$CHECKSUM_PATH"
          } >> "$GITHUB_ENV"

      - name: Run packaged launch smoke
        run: |
          DMG_PATH="$DMG_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-rehearsal-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Upload package rehearsal artifacts
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-package-preflight
          path: |
            ${{ env.APP_PATH }}
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

      - name: Upload package rehearsal logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-package-preflight-logs
          path: native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

  check-signing-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Signing secrets not configured — skipping signed DMG build"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  release-sign-package:
    name: Sign and prove candidate DMG
    runs-on: macos-26
    needs: [release-package-preflight, check-signing-secrets]
    if: github.event_name != 'pull_request' && needs.check-signing-secrets.outputs.available == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download packaged app artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-package-preflight
          path: ${{ runner.temp }}/release-package-preflight

      - name: Resolve packaged app paths
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/release-package-preflight" -type d -name 'Pnevma.app' -print -quit)"
          test -n "$APP_PATH"
          # GitHub artifact upload/download strips executable permissions.
          # Restore them on all Mach-O binaries before signing.
          find "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Helpers" \
            -type f -exec chmod +x {} + 2>/dev/null || true
          VERSION="$(./scripts/release-version.sh check)"
          mkdir -p "$RUNNER_TEMP/release-sign"
          {
            echo "APP_PATH=$APP_PATH"
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$RUNNER_TEMP/release-sign/Pnevma-${VERSION}-macos-arm64.dmg"
            echo "CHECKSUM_PATH=$RUNNER_TEMP/release-sign/Pnevma-${VERSION}-macos-arm64.dmg.sha256"
          } >> "$GITHUB_ENV"
          mkdir -p release-evidence

      - name: Prepare signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/release-signing" \
          ./scripts/release-prepare-signing-keychain.sh
          cat "$RUNNER_TEMP/release-signing/signing-keychain.env" >> "$GITHUB_ENV"

      - name: Produce signed candidate and evidence bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.SIGNING_KEYCHAIN_PATH }}
        run: |
          EVIDENCE_DIR="$GITHUB_WORKSPACE/release-evidence" \
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          RUN_PREFLIGHT=0 \
          ./scripts/release-signed-candidate.sh

      - name: Upload signed DMG
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: signed-dmg
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
