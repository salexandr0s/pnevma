name: Release Rehearsal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS: 30

jobs:
  release-package-preflight:
    name: Release package preflight
    runs-on: macos-latest
    env:
      GHOSTTY_XCFRAMEWORK_TARGET: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native build tools
        run: brew install just

      - name: Install pinned XcodeGen
        run: ./scripts/install-xcodegen-ci.sh

      - name: Install pinned Zig
        run: ./scripts/install-zig-ci.sh

      - name: Verify xcodegen version
        run: |
          EXPECTED_XCODEGEN="$(cat .xcodegen-version)"
          ACTUAL_XCODEGEN="$(xcodegen version 2>/dev/null || echo unknown)"
          if [[ "$ACTUAL_XCODEGEN" != *"$EXPECTED_XCODEGEN"* ]]; then
            echo "WARNING: xcodegen version mismatch: expected $EXPECTED_XCODEGEN, got $ACTUAL_XCODEGEN"
          fi

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run release preflight
        run: ./scripts/release-preflight.sh

      - name: Package release DMG
        run: |
          APP_PATH="$GITHUB_WORKSPACE/native/build/Release/Pnevma.app"
          test -d "$APP_PATH"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$GITHUB_WORKSPACE/native/Info.plist")"
          DMG_PATH="$GITHUB_WORKSPACE/Pnevma-${VERSION}-macos-arm64.dmg"
          CHECKSUM_PATH="${DMG_PATH}.sha256"
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          ./scripts/release-macos-package-dmg.sh
          {
            echo "APP_PATH=$APP_PATH"
            echo "DMG_PATH=$DMG_PATH"
            echo "CHECKSUM_PATH=$CHECKSUM_PATH"
          } >> "$GITHUB_ENV"

      - name: Run packaged launch smoke
        run: |
          DMG_PATH="$DMG_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-rehearsal-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Upload package rehearsal artifacts
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-package-preflight
          path: |
            ${{ env.APP_PATH }}
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

      - name: Upload package rehearsal logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-package-preflight-logs
          path: native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

  check-signing-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" && -n "$APPLE_NOTARY_PROFILE" && -n "$APPLE_NOTARY_APPLE_ID" && -n "$APPLE_NOTARY_TEAM_ID" && -n "$APPLE_NOTARY_PASSWORD" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Signing secrets not configured — skipping sign/notarize dry run"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  release-sign-notarize-dry-run:
    name: Release sign/notarize dry run
    runs-on: macos-latest
    needs: [release-package-preflight, check-signing-secrets]
    if: github.event_name != 'pull_request' && needs.check-signing-secrets.outputs.available == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download packaged app artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-package-preflight
          path: ${{ runner.temp }}/release-package-preflight

      - name: Resolve packaged app paths
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/release-package-preflight" -type d -name 'Pnevma.app' -print -quit)"
          test -n "$APP_PATH"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Contents/Info.plist")"
          mkdir -p "$RUNNER_TEMP/release-sign"
          {
            echo "APP_PATH=$APP_PATH"
            echo "VERSION=$VERSION"
            echo "DMG_PATH=$RUNNER_TEMP/release-sign/Pnevma-${VERSION}-macos-arm64.dmg"
            echo "CHECKSUM_PATH=$RUNNER_TEMP/release-sign/Pnevma-${VERSION}-macos-arm64.dmg.sha256"
          } >> "$GITHUB_ENV"
          mkdir -p release-evidence

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"
          echo "APPLE_NOTARY_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/app-sign.txt

      - name: Check signed app entitlements
        run: APP_PATH="$APP_PATH" ./scripts/check-entitlements.sh | tee release-evidence/app-entitlements-check.txt

      - name: Notarize app
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-notarize.sh | tee release-evidence/app-notarize.txt

      - name: Staple and verify
        run: APP_PATH="$APP_PATH" ./scripts/release-macos-staple-verify.sh | tee release-evidence/app-staple-verify.txt

      - name: Package signed DMG
        run: |
          APP_PATH="$APP_PATH" \
          DMG_PATH="$DMG_PATH" \
          CHECKSUM_PATH="$CHECKSUM_PATH" \
          ./scripts/release-macos-package-dmg.sh | tee release-evidence/dmg-package.txt

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_KEYCHAIN_PATH: ${{ env.APPLE_NOTARY_KEYCHAIN }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-sign.sh | tee release-evidence/dmg-sign.txt

      - name: Notarize DMG
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-notarize.sh | tee release-evidence/dmg-notarize.txt

      - name: Staple and verify DMG
        run: TARGET_PATH="$DMG_PATH" ./scripts/release-macos-staple-verify.sh | tee release-evidence/dmg-staple-verify.txt

      - name: Run packaged launch smoke after stapling
        run: |
          DMG_PATH="$DMG_PATH" \
          LOG_PATH="$GITHUB_WORKSPACE/native/build/logs/release-rehearsal-dmg-launch.log" \
          ./scripts/run-packaged-launch-smoke.sh

      - name: Collect release evidence
        run: |
          codesign -d --entitlements :- "$APP_PATH" > release-evidence/app-entitlements.plist 2>/dev/null
          codesign --verify --deep --strict --verbose=2 "$APP_PATH" > release-evidence/app-codesign-verify.txt 2>&1
          spctl --assess --type exec --verbose=4 "$APP_PATH" > release-evidence/app-spctl.txt 2>&1
          codesign --verify --verbose=2 "$DMG_PATH" > release-evidence/dmg-codesign-verify.txt 2>&1
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH" > release-evidence/dmg-spctl.txt 2>&1
          cp "$CHECKSUM_PATH" release-evidence/

      - name: Upload release dry-run evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-sign-notarize-dry-run
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.CHECKSUM_PATH }}
            release-evidence/**
            native/build/logs/**
          retention-days: ${{ env.RELEASE_REHEARSAL_ARTIFACT_RETENTION_DAYS }}

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
